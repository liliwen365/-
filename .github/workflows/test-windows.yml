name: Test on Windows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify imports
      shell: bash
      run: |
        python -c "
        import sys; sys.path.insert(0, '.')
        print('Python:', sys.executable)
        print('Platform:', sys.platform)
        import tempfile; print('Temp:', tempfile.gettempdir())
        from backend.config import settings
        print('DATA_DIR:', settings.DATA_DIR)
        print('DB_PATH:', settings.DB_PATH)
        print('PLUGINS_DIR:', settings.PLUGINS_DIR)
        from backend.database import engine
        print('DB URL:', engine.url)
        from backend.capabilities.file_scanner import scan_directory
        print('file_scanner: OK')
        from backend.capabilities.template_engine import build_path
        print('template_engine: OK')
        from backend.utils.path_utils import PathUtils
        print('path_utils: OK')
        print('All imports OK')
        "

    - name: Run tests
      run: pytest tests/ -v --tb=long

    - name: Test file scanner with Windows paths
      shell: bash
      run: |
        mkdir -p test_files_win/source
        echo "test content" > "test_files_win/source/ABC001_invoice.pdf"
        echo "test content" > "test_files_win/source/ABC001_customs.pdf"
        python -c "
        import sys, os
        sys.path.insert(0, '.')
        from backend.capabilities.file_scanner import scan_directory
        result = scan_directory('test_files_win/source', '*.pdf')
        print(f'Found {len(result.files)} files')
        assert result.error is None, f'Scan failed: {result.error}'
        assert len(result.files) >= 2, f'Expected at least 2 files, got {len(result.files)}'
        print('Windows path scan test passed')
        "

    - name: Test path utilities on Windows
      shell: bash
      run: |
        python -c "
        import sys; sys.path.insert(0, '.')
        from backend.utils.path_utils import PathUtils
        assert PathUtils.is_windows_unc_path('\\\\\\\\NAS-Server\\\\Share')
        assert PathUtils.is_windows_drive_path('Y:\\\\data')
        assert 'UNC' in PathUtils.get_path_type('\\\\\\\\Server\\\\Share')
        assert '盘符' in PathUtils.get_path_type('Y:\\\\data')
        print('Path utilities test passed')
        "
