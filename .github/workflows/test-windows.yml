name: Test on Windows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-playwright pytest-asyncio python-multipart

    - name: Install Playwright browsers
      run: playwright install chromium

    - name: Create test files with Chinese names
      run: |
        mkdir test_files_win
        mkdir test_files_win\source
        "测试内容" | Out-File -Encoding UTF8 test_files_win\source\ABC001发票.pdf
        "报关单内容" | Out-File -Encoding UTF8 test_files_win\source\ABC001报关单.pdf

    - name: Run unit tests
      run: pytest tests/ -v --tb=short

    - name: Run Windows compatibility tests
      run: pytest tests/test_windows_compatibility.py -v --tb=short

    - name: Test file scanner with Windows paths
      run: |
        $python -c "
        from backend.capabilities.file_scanner import scan_directory
        result = scan_directory('test_files_win\source', '*.pdf')
        print(f'Found {len(result.files)} files')
        assert result.error is None, f'Scan failed: {result.error}'
        assert len(result.files) >= 2, f'Expected at least 2 files, got {len(result.files)}'
        print('✓ Windows path test passed')
        "

    - name: Test UNC path simulation
      run: |
        # 模拟UNC路径场景
        $python -c "
        from pathlib import Path, PureWindowsPath
        # 测试路径解析
        unc_path = PureWindowsPath(r'\\Server\Share\报关单\2026年')
        print(f'UNC path parts: {unc_path.parts}')
        assert 'Share' in unc_path.parts
        print('✓ UNC path parsing passed')
        "
