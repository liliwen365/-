name: Test on Windows

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit & integration tests
      run: pytest tests/ -v --tb=short

    - name: Test file scanner with Windows paths
      shell: bash
      run: |
        mkdir -p test_files_win/source
        echo "test content" > "test_files_win/source/ABC001发票.pdf"
        echo "test content" > "test_files_win/source/ABC001报关单.pdf"
        python -c "
        import sys, os
        sys.path.insert(0, '.')
        from backend.capabilities.file_scanner import scan_directory
        result = scan_directory('test_files_win/source', '*.pdf')
        print(f'Found {len(result.files)} files')
        assert result.error is None, f'Scan failed: {result.error}'
        assert len(result.files) >= 2, f'Expected at least 2 files, got {len(result.files)}'
        print('Windows path scan test passed')
        "

    - name: Test path utilities on Windows
      shell: bash
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from backend.utils.path_utils import PathUtils
        from pathlib import PureWindowsPath

        # UNC path detection
        assert PathUtils.is_windows_unc_path(r'\\\\NAS-Server\\\\Share')
        assert PathUtils.is_windows_unc_path('//NAS-Server/Share')

        # Drive path detection
        assert PathUtils.is_windows_drive_path(r'Y:\\报关单')
        assert PathUtils.is_windows_drive_path('C:\\Users')

        # Path type identification
        assert 'UNC' in PathUtils.get_path_type(r'\\\\Server\\\\Share')
        assert '盘符' in PathUtils.get_path_type('Y:\\data')

        print('Path utilities test passed')
        "

    - name: Test template engine
      shell: bash
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from backend.capabilities.template_engine import build_path, build_filename_pattern

        # Path template with override
        assert build_path('Y:\\\\data\\\\{PathKeyword}', 'ABC001', override='') == 'Y:\\\\data\\\\ABC001'
        assert build_path('Y:\\\\data\\\\{PathKeyword}', 'ABC001', override='D:\\\\other') == 'D:\\\\other'

        # Filename pattern
        pat = build_filename_pattern('*{PrimaryKeyword}*发票*.*', 'ABC', '发票')
        assert 'ABC' in pat
        print('Template engine test passed')
        "
