name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller --noconfirm --onedir --windowed --name "FileOrganizer"
          --icon="assets/icon.ico"
          --add-data "templates;templates"
          --add-data "assets;assets"
          --hidden-import=pandas
          --hidden-import=rsa
          --collect-all pandas
          main.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" setup.iss

      - name: Get version from tag
        id: get_version
        run: |
          $tag = "${{ github.ref_name }}"
          echo "VERSION=$tag" >> $env:GITHUB_ENV

      - name: Upload Installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileOrganizer_${{ env.VERSION }}_Setup
          path: Output/*.exe
          retention-days: 30

      - name: Upload portable EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileOrganizer_${{ env.VERSION }}_Portable
          path: dist/FileOrganizer/
          retention-days: 30
